<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #0f2027;
    color: white;
}

.container {
    width: 380px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 16px;
    background: #1c2b33;
    text-align: center;
}

#channelGrid {
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    margin:15px 0;
}

.channel-card {
    position: relative;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    cursor:pointer;
}

.channel-thumb {
    width:100%;
    height:80px;
    object-fit:cover;
}

.channel-name {
    font-size:12px;
    padding:6px;
}

.live-badge {
    position:absolute;
    top:6px;
    left:6px;
    background:red;
    color:white;
    font-size:10px;
    padding:2px 6px;
    border-radius:4px;
    display:none;
}

.player-wrap {
    position: relative;
}

#player {
    width:100%;
    height:210px;
    border-radius:10px;
}

#preview {
    position:absolute;
    width:100%;
    height:210px;
    border-radius:10px;
    opacity:0;
    filter: blur(4px);
    transition:0.2s;
}

.yt-btn {
    display:block;
    background:#ff0000;
    color:white;
    text-decoration:none;
    padding:5px;
    font-size:11px;
    border-radius:5px;
    margin:6px;
}

#status {
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<div class="container">
    <h1>📺 myTV</h1>

    <div id="channelGrid"></div>

    <div id="status">NO SIGNAL</div>

    <div class="player-wrap">
        <iframe id="preview"></iframe>
        <div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

// 🔧 Extract YouTube ID
function getVideoId(url) {
    try {
        const u = new URL(url);

        if (u.hostname.includes("youtu.be")) return u.pathname.slice(1);
        if (u.searchParams.get("v")) return u.searchParams.get("v");
        if (u.pathname.includes("/live/")) return u.pathname.split("/live/")[1];

    } catch {}

    return null;
}

// ================= PLAYER SYSTEM =================

const grid = document.getElementById("channelGrid");
const status = document.getElementById("status");
const preview = document.getElementById("preview");

let player;
let currentChannel = null;
let index = 0;

function onYouTubeIframeAPIReady() {
    player = new YT.Player("player", {
        events: {
            onReady: () => { buildGrid(); noSignal(); },
            onStateChange: onStateChange
        }
    });
}

function buildGrid() {
    grid.innerHTML = "";

    channels.forEach(ch => {
        const div = document.createElement("div");
        div.className = "channel-card";

        div.innerHTML = `
            <div class="live-badge">LIVE</div>
            <img class="channel-thumb" src="${ch.thumb}">
            <div class="channel-name">CH ${ch.channel} - ${ch.name}</div>
            <a class="yt-btn" target="_blank" href="https://youtu.be/${getVideoId(ch.playlist[0])}">▶ YouTube</a>
        `;

        const badge = div.querySelector(".live-badge");

        div.onclick = () => {
            showPreview(ch);
            setTimeout(() => tune(ch), 400);
        };

        ch._badge = badge;
        grid.appendChild(div);
    });
}

function showPreview(ch) {
    const id = getVideoId(ch.playlist[0]);
    preview.src = "https://www.youtube.com/embed/" + id;
    preview.style.opacity = "1";
    status.innerText = "TUNING...";
}

function tune(ch) {
    currentChannel = ch;
    index = 0;
    preview.style.opacity = "0";
    updateLive();
    playCurrent();
}

function playCurrent() {
    const id = getVideoId(currentChannel.playlist[index]);
    player.loadVideoById(id);

    status.innerText =
        "📺 " + currentChannel.name +
        " (" + (index + 1) + "/" + currentChannel.playlist.length + ")";
}

function nextVideo() {
    index++;
    if (index >= currentChannel.playlist.length) index = 0;
    playCurrent();
}

function onStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) nextVideo();
}

function updateLive() {
    channels.forEach(ch => {
        if (!ch._badge) return;
        ch._badge.style.display = (ch === currentChannel) ? "block" : "none";
    });
}

function noSignal() {
    currentChannel = null;
    preview.style.opacity = "0";
    status.innerText = "NO SIGNAL";
    player.stopVideo();
    updateLive();
}
