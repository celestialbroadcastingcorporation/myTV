<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>myTV</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
    background-size: 600% 600%;
    animation: bgMove 15s ease infinite;
    color: white;
}

@keyframes bgMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container {
    width: 380px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
}

.player-wrap {
    position: relative;
}

.static {
    position: absolute;
    width: 100%;
    height: 210px;
    background: repeating-radial-gradient(circle, #fff 0%, #000 2%);
    opacity: 0;
    animation: noise 0.2s infinite;
    border-radius: 10px;
    pointer-events: none;
}

@keyframes noise {
    0% {transform: translate(0,0);}
    50% {transform: translate(-2px,2px);}
    100% {transform: translate(2px,-2px);}
}

#player {
    width: 100%;
    height: 210px;
    border-radius: 10px;
}

input[type=range] {
    width: 100%;
}

#channelDisplay {
    font-size: 26px;
    margin-bottom: 10px;
}

.info-box {
    margin-top: 15px;
    padding: 12px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    font-size: 13px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">
    <h1>📺 myTV</h1>
    <div>"Your TV, Your Choice"</div>

    <div id="channelDisplay">Channel 10</div>
    <input type="range" min="1" max="100" value="10" id="tuner">

    <div id="status">Loading...</div>

    <div class="player-wrap">
        <div class="static" id="static"></div>
        <div id="player"></div>
    </div>

    <div class="info-box">
        <b>THE PURPOSE</b><br>
        Entertainment and information broadcasting.
        <br><br>
        <b>CREATOR</b><br>
        Matthias Agreste
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
// 🔧 STRONG VIDEO ID EXTRACTOR
function getVideoId(url) {
    try {
        const u = new URL(url);

        if (u.hostname.includes("youtu.be")) {
            return u.pathname.replace("/", "");
        }

        if (u.searchParams.get("v")) {
            return u.searchParams.get("v");
        }

    } catch {}

    return null;
}

// 💾 MEMORY
function saveMemory(channel, index, time) {
    localStorage.setItem("myTV_" + channel, JSON.stringify({index, time}));
}

function loadMemory(channel) {
    const data = localStorage.getItem("myTV_" + channel);
    return data ? JSON.parse(data) : null;
}

// 📺 CHANNEL
const channels = [
{
    channel: 10,
    name: "Main Channel",
    playlist: [
        "https://youtu.be/CBCIbLMiRiU",
        "https://youtu.be/9EHAo6rEuas",
        "https://youtu.be/XjFsZj1aHow",
        "https://youtu.be/n3Mb2WRstME",
        "https://youtu.be/NC91hzXiL9Q?si=5719qZBwMGbOVddV"
    ]
}
];

// UI
const tuner = document.getElementById("tuner");
const display = document.getElementById("channelDisplay");
const status = document.getElementById("status");
const staticFx = document.getElementById("static");

let player;
let ready = false;
let currentChannel = null;
let index = 0;
let saveTimer = null;

// 🎬 API READY
function onYouTubeIframeAPIReady() {
    player = new YT.Player("player", {
        events: {
            onReady: () => {
                ready = true;
                tune(channels[0]);
            },
            onStateChange: onPlayerStateChange,
            onError: onPlayerError
        }
    });
}

// 🎚 TUNER
tuner.addEventListener("input", () => {
    const ch = parseInt(tuner.value);
    display.innerText = "Channel " + ch;

    const found = channels.find(c => c.channel === ch);
    if (found) tune(found);
    else noSignal();
});

// 📺 TUNE
function tune(ch) {
    if (!ready || currentChannel === ch) return;

    currentChannel = ch;

    const mem = loadMemory(ch.name);
    index = mem?.index || 0;

    play(mem?.time || 0);
}

// ▶ PLAY
function play(startTime = 0) {
    if (!currentChannel) return;

    const videoId = getVideoId(currentChannel.playlist[index]);

    if (!videoId) {
        next(); // skip invalid
        return;
    }

    staticFx.style.opacity = 0.6;

    setTimeout(() => {
        player.loadVideoById({
            videoId,
            startSeconds: startTime
        });

        status.innerText = "Now Playing: " + currentChannel.name;
        staticFx.style.opacity = 0;
    }, 500);

    clearInterval(saveTimer);
    saveTimer = setInterval(() => {
        if (!player || !currentChannel) return;
        saveMemory(currentChannel.name, index, player.getCurrentTime());
    }, 4000);
}

// 🔁 NEXT VIDEO
function next() {
    index = (index + 1) % currentChannel.playlist.length;
    play(0);
}

// 🔁 END EVENT
function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
        next();
    }
}

// ❗ HANDLE ERRORS (THIS FIXES "VIDEO UNAVAILABLE")
function onPlayerError(e) {
    console.warn("Skipping unavailable video:", currentChannel.playlist[index]);
    next(); // auto-skip broken video
}

// ❌ NO SIGNAL
function noSignal() {
    currentChannel = null;
    status.innerText = "No Signal";
    staticFx.style.opacity = 0.5;
    if (player) player.stopVideo();
}
</script>
</body>
</html>
